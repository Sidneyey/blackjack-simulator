<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack Simulator</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-800 text-white flex flex-col items-center p-10">

<h1 class="text-4xl font-bold mb-10">
    Blackjack Simulator
</h1>

<div class="space-x-4">

    <button onclick="hit()" class="bg-blue-500 px-6 py-3 rounded-lg hover:bg-blue-600">
        Hit
    </button>

    <button onclick="stand()" class="bg-red-500 px-6 py-3 rounded-lg hover:bg-red-600">
        Stand
    </button>

    <button onclick="double()" class="bg-gray-500 px-6 py-3 rounded-lg hover:bg-gray-600">
        Double
    </button>

    <button onclick="split()" class="bg-blue-500 px-6 py-3 rounded-lg">
        Split
    </button>

    <div id="dealerCards" class="absolute top-10 left-20 bg-white text-black p-2 rounded">
        Dealer Cards
    </div>

    <div id="playerCards" class="absolute bottom-10 left-20 bg-white text-black p-2 rounded">
        Player Cards
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
